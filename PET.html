:root{
  --bg:#f4f1ea;
  --surface:#ffffff;
  --ink:#23201c;
  --muted:#8a857c;
  --accent:#b5462f;
  --accent_ink:#ffffff;
  --good:#2f7d52;
  --good_bg:#e6f3ec;
  --bad:#c0492f;
  --bad_bg:#fbe9e4;
  --line:#e3ddd2;
  --chip:#efe9dd;
  --radius:16px;
  --shadow:0 6px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'QuizCJK','Noto Sans CJK TC','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  line-height:1.7;-webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.wrap{max-width:760px;margin:0 auto;padding:24px 18px 64px;}
header.top{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.title{font-weight:700;font-size:20px;flex:1;min-width:0;}
.counter{color:var(--muted);font-size:14px;white-space:nowrap;}
.bar{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin-bottom:22px;}
.bar>i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s ease;}
.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:26px 24px;min-height:220px;
  display:flex;flex-direction:column;
}
.badge{
  align-self:flex-start;font-size:13px;font-weight:700;color:var(--accent);
  background:var(--chip);border-radius:99px;padding:3px 12px;margin-bottom:14px;
}
.qno{color:var(--muted);font-weight:700;}
.question{font-size:20px;font-weight:700;margin:0 0 16px;}
.options{list-style:none;margin:0 0 6px;padding:0;display:flex;flex-direction:column;gap:10px;}
.options li{
  border:1.5px solid var(--line);border-radius:12px;padding:10px 14px;display:flex;gap:10px;align-items:flex-start;
  background:var(--surface);
}
.options li .lab{font-weight:700;color:var(--muted);flex:none;}
.options li.correct{border-color:var(--good);background:var(--good_bg);}
.options li.correct .lab{color:var(--good);}
.tfhint{display:flex;gap:14px;margin:4px 0 6px;}
.tfhint span{border:1.5px solid var(--line);border-radius:12px;padding:8px 20px;font-weight:700;color:var(--muted);}
.tfhint span.correct{border-color:var(--good);background:var(--good_bg);color:var(--good);}
.reveal-btn{
  margin-top:auto;align-self:stretch;border:none;cursor:pointer;
  background:var(--accent);color:var(--accent_ink);font-weight:700;font-size:17px;
  border-radius:12px;padding:14px;font-family:inherit;transition:filter .15s;
}
.reveal-btn:hover{filter:brightness(1.05);}
.answer-zone{margin-top:18px;border-top:1px dashed var(--line);padding-top:16px;display:none;}
.answer-zone.show{display:block;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.ans-label{font-size:13px;font-weight:700;color:var(--good);letter-spacing:.05em;margin-bottom:4px;}
.ans-row{display:flex;align-items:flex-start;gap:10px;}
.ans-row .answer{flex:1;font-size:18px;font-weight:700;margin-bottom:14px;}
.answer{font-size:18px;font-weight:700;margin-bottom:14px;}
.exp-label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:4px;}
.explanation{color:var(--ink);font-size:16px;}
.explanation.empty{color:var(--muted);font-style:italic;}
.grade{display:flex;gap:12px;margin-top:20px;}
.grade button{
  flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;
  border-radius:12px;padding:13px;transition:filter .15s;
}
.grade .know{background:var(--good);color:#fff;}
.grade .dontknow{background:var(--bad);color:#fff;}
.grade button:hover{filter:brightness(1.05);}
.navrow{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.navrow button{
  background:none;border:none;color:var(--muted);cursor:pointer;font-family:inherit;font-size:14px;
  padding:6px 4px;
}
.navrow button:hover{color:var(--accent);}
.navrow button:disabled{opacity:.35;cursor:default;}
.hint{color:var(--muted);font-size:13px;text-align:center;margin-top:18px;}
kbd{
  background:var(--chip);border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;
  padding:1px 7px;font-size:12px;font-family:inherit;color:var(--ink);
}
/* 結束畫面 */
.summary{text-align:center;padding:10px 4px;}
.donut{width:170px;height:170px;margin:6px auto 18px;position:relative;}
.donut svg{transform:rotate(-90deg);}
.donut .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut .pct b{font-size:34px;}
.donut .pct small{color:var(--muted);font-size:13px;}
.tallies{display:flex;justify-content:center;gap:26px;margin:8px 0 22px;}
.tally{display:flex;flex-direction:column;align-items:center;}
.tally b{font-size:26px;}
.tally.know b{color:var(--good);}
.tally.dontknow b{color:var(--bad);}
.tally span{color:var(--muted);font-size:13px;}
.actions{display:flex;flex-direction:column;gap:12px;max-width:380px;margin:0 auto;}
.actions button{
  border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:16px;border-radius:12px;padding:14px;
}
.actions .primary{background:var(--accent);color:var(--accent_ink);}
.actions .ghost{background:var(--surface);border:1.5px solid var(--line);color:var(--ink);}
.actions button:disabled{opacity:.4;cursor:default;}
.actions button:hover:not(:disabled){filter:brightness(1.04);}
.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;}
.katex{font-size:1.02em;}
.math-fallback{color:var(--bad);font-family:monospace;}
@media (max-width:560px){
  .wrap{padding:18px 14px 56px;}
  .card{padding:22px 18px;}
  .question{font-size:18px;}
}
.home-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;border:1.5px solid var(--line);color:var(--muted);text-decoration:none;font-size:18px;transition:border-color .15s,color .15s,background .15s;flex:none;}
.home-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--chip);}
</style>
</head>

a", "question": "請問做後殺耐溫測試時，須設定恆溫水槽溫度為幾度，樣瓶置入內部放置幾分鐘後取出回溫？", "options": null, "explanation": "", "answer": "72度，12分鐘"}, {"id": 17, "type": "qa", "question": "請問做跌落測試時，CSD瓶需先做何種測試試驗，HPR瓶需先經過何種測試試驗？", "options": null, "explanation": "", "answer": "CSD瓶需先以卡特測試試驗，HPR瓶需先經後殺菌測試試驗"}, {"id": 18, "type": "qa", "question": "請問做跌落測試時，將待檢測之瓶子放置於跌落試驗機滑落道上方，在高幾公尺以及幾度的斜角，將瓶子瓶口朝上，放開使其自然落下？", "options": null, "explanation": "", "answer": "高兩公尺、三十五度斜角"}, {"id": 19, "type": "qa", "question": "請問水料（無菌）、熱料以及汽水料的IV值為何？", "options": null, "explanation": "", "answer": "水料無菌為0.80dL/g，熱充料為0.76dL/g，汽水料為0.84或0.86dL/g"}, {"id": 20, "type": "qa", "question": "請將以下英文縮寫配對至正確的中文意思：支撐環外徑、支撐環高度、防盜環外徑、防盜環高度、瓶端口外徑、瓶端口外徑高度、瓶口內徑、螺牙外徑（縮寫為A、D、E、F、I、S、T、Z）。", "options": null, "explanation": "", "answer": "支撐環外徑為Z、支撐環高度為F、防盜環外徑為A、防盜環高度為D、瓶端口外徑為E、瓶端口外徑高度為S、瓶口內徑為I、螺牙外徑為T"}, {"id": 21, "type": "qa", "question": "請問瓶胚射出後大約多久，才能進行結晶動作？", "options": null, "explanation": "", "answer": "大約一個禮拜"}, {"id": 22, "type": "qa", "question": "請問若需生產有顏色之瓶胚，需經由甚麼機器將色漿與酯粒混合均勻？", "options": null, "explanation": "", "answer": "攪拌器"}, {"id": 23, "type": "qa", "question": "請問射出機的哪個構造能將酯粒融化？", "options": null, "explanation": "", "answer": "螺桿"}, {"id": 24, "type": "qa", "question": "請問瓶胚射出中，為避免原料回流，模具的空間內會持續加壓，確保原料充填的密實性，此過程稱之為？", "options": null, "explanation": "", "answer": "保壓"}, {"id": 25, "type": "qa", "question": "請問閥針功用為何？", "options": null, "explanation": "", "answer": "控制塑料進出"}, {"id": 26, "type": "qa", "question": "請問酯粒乾燥的溫度大約在幾度到幾度之間？", "options": null, "explanation": "", "answer": "165度到175度之間"}, {"id": 27, "type": "qa", "question": "請問酯粒乾燥的時間須至幾小時？", "options": null, "explanation": "", "answer": "六小時"}, {"id": 28, "type": "qa", "question": "請問吹瓶前瓶胚會經過吹瓶機的哪個部分進行軟化？", "options": null, "explanation": "", "answer": "加熱爐"}, {"id": 29, "type": "qa", "question": "請問瓶胚進入加熱爐後，會經由哪種燈管將瓶胚局部加熱軟化？", "options": null, "explanation": "", "answer": "石英加熱燈管"}, {"id": 30, "type": "qa", "question": "請問吹瓶時，會用多少BAR的壓力進行預吹及吹瓶動作？", "options": null, "explanation": "", "answer": "以七至十三BAR的壓力進行預吹，再以四十BAR壓力吹瓶"}]}</script>
<script>
(function(){
  "use strict";

  var DATA = JSON.parse(document.getElementById('quizData').textContent);
  var QS = DATA.questions || [];
  var TYPE_LABEL = {qa:'問答題', mcq:'單選題', tf:'是非題', fill:'填空題'};
  var STORE_KEY = 'quizprac:' + (DATA.title||'') + ':' + QS.length;

  // 狀態：order 為本輪題目索引序列；grades[原始索引] = 'know'|'dontknow'|undefined
  var order = QS.map(function(_,i){return i;});
  var pos = 0;            // 在 order 中的位置
  var revealed = false;
  var grades = {};
  var mode = 'full';     // 'full' 或 'retry'

  // 嘗試還原進度（離線檔案直接開時可用；預覽環境失敗則略過）
  try {
    var saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (saved && saved.grades) grades = saved.grades;
  } catch(e){}

  function persist(){
    try { localStorage.setItem(STORE_KEY, JSON.stringify({grades:grades})); } catch(e){}
  }
  function clearStore(){ try{ localStorage.removeItem(STORE_KEY); }catch(e){} }

  var stage = document.getElementById('stage');
  var counter = document.getElementById('counter');
  var barFill = document.getElementById('barFill');

  function esc(s){ return String(s==null?'':s); }
  function letter(i){ return String.fromCharCode(65+i); }

  function fieldHTML(q, key){
    // 優先用伺服端預渲染的 *_html（含 KaTeX）；沒有就純文字
    if (q[key+'_html'] != null) return q[key+'_html'];
    var v = q[key]; return v==null ? '' : escapeText(v);
  }
  function optHTML(q, i){
    if (q.options_html && q.options_html[i] != null) return q.options_html[i];
    return escapeText((q.options||[])[i]||'');
  }
  function answerHTML(q){
    if (q.type==='mcq'){
      var i = q.answer;
      var t = (q.options||[])[i]||'';
      return '（' + letter(i) + '）' + escapeText(t);
    }
    if (q.type==='tf') return q.answer ? '是（○）' : '否（╳）';
    if (q.explanation_html!=null && q.type==='fill'){ /* fall through */ }
    return escapeText(q.answer==null?'':q.answer);
  }
  function escapeText(s){
    return String(s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});
  }

  function updateProgress(){
    counter.textContent = (pos+1) + ' / ' + order.length;
    barFill.style.width = (order.length? (pos)/order.length*100 : 0) + '%';
  }

  function renderCard(){
    revealed = false;
    var q = QS[order[pos]];
    updateProgress();
    var html = '';
    html += '<div class="card" id="card">';
    html += '<div class="badge">'+ (TYPE_LABEL[q.type]||'題目') +'</div>';
    html += '<div class="question"><span class="qno">第 '+(pos+1)+' 題　</span>'+ fieldHTML(q,'question') +'</div>';
    if (q.type==='mcq' && q.options){
      html += '<ul class="options" id="opts">';
      for (var i=0;i<q.options.length;i++){
        html += '<li data-i="'+i+'"><span class="lab">'+letter(i)+'</span><span>'+ optHTML(q,i) +'</span></li>';
      }
      html += '</ul>';
    } else if (q.type==='tf'){
      html += '<div class="tfhint" id="tf"><span data-v="1">是　○</span><span data-v="0">否　╳</span></div>';
    }
    html += '<div class="answer-zone" id="azone">';
    html += '  <div class="ans-label">正解</div>';
    html += '  <div class="ans-row"><div class="answer">'+ answerHTML(q) +'</div>';
    html += '  </div>';
    var exp = fieldHTML(q,'explanation');
    if (exp && exp.trim()){
      html += '  <div class="exp-label">講解</div><div class="explanation">'+ exp +'</div>';
    } else {
      html += '  <div class="exp-label">講解</div><div class="explanation empty">（本題未附講解）</div>';
    }
    html += '  <div class="grade">';
    html += '    <button class="know" id="bKnow">會　✓</button>';
    html += '    <button class="dontknow" id="bDont">不會　✗</button>';
    html += '  </div>';
    html += '</div>';
    html += '<button class="reveal-btn" id="bReveal">顯示答案</button>';
    html += '<div class="navrow">';
    html += '  <button id="bPrev"'+(pos===0?' disabled':'')+'>← 上一題</button>';
    html += '  <button id="bNext">跳過 →</button>';
    html += '</div>';
    html += '</div>';
    html += '<div class="hint"><kbd>空白鍵</kbd> 顯示答案　<kbd>1</kbd> 會　<kbd>2</kbd> 不會　<kbd>←</kbd><kbd>→</kbd> 換題</div>';
    stage.innerHTML = html;

    document.getElementById('bReveal').onclick = doReveal;
    document.getElementById('card').onclick = function(e){
      if (!revealed && !e.target.closest('button')) doReveal();
    };
    document.getElementById('bKnow').onclick = function(){ grade('know'); };
    document.getElementById('bDont').onclick = function(){ grade('dontknow'); };
    document.getElementById('bPrev').onclick = prev;
    document.getElementById('bNext').onclick = next;

  }

  function doReveal(){
    if (revealed) return;
    revealed = true;
    var q = QS[order[pos]];
    var az = document.getElementById('azone');
    az.classList.add('show');
    document.getElementById('bReveal').style.display='none';
    if (q.type==='mcq'){
      var li = document.querySelectorAll('#opts li');
      if (li[q.answer]) li[q.answer].classList.add('correct');
    } else if (q.type==='tf'){
      var sp = document.querySelectorAll('#tf span');
      sp.forEach(function(s){ if (String(s.getAttribute('data-v'))===(q.answer?'1':'0')) s.classList.add('correct'); });
    }
  }

  function grade(v){
    if (!revealed) return;
    grades[order[pos]] = v;
    persist();
    advance();
  }
  function advance(){
    if (pos < order.length-1){ pos++; renderCard(); }
    else { renderSummary(); }
  }
  function next(){ if (pos < order.length-1){ pos++; renderCard(); } else { renderSummary(); } }
  function prev(){ if (pos>0){ pos--; renderCard(); } }

  function renderSummary(){
    updateProgressDone();
    var know=0, dont=0;
    order.forEach(function(idx){
      if (grades[idx]==='know') know++;
      else if (grades[idx]==='dontknow') dont++;
    });
    var graded = know+dont;
    var pct = graded? Math.round(know/graded*100) : 0;
    var dontList = order.filter(function(idx){ return grades[idx]==='dontknow'; });

    var C=2*Math.PI*70;
    var off = C*(1 - pct/100);
    var html = '<div class="card"><div class="summary">';
    html += '<h2 style="margin:4px 0 2px;">本輪完成</h2>';
    html += '<div class="donut"><svg width="170" height="170" viewBox="0 0 170 170">';
    html += '<circle cx="85" cy="85" r="70" fill="none" stroke="var(--line)" stroke-width="16"></circle>';
    html += '<circle cx="85" cy="85" r="70" fill="none" stroke="var(--good)" stroke-width="16" stroke-linecap="round" stroke-dasharray="'+C+'" stroke-dashoffset="'+off+'"></circle>';
    html += '</svg><div class="pct"><b>'+pct+'%</b><small>會的比例</small></div></div>';
    html += '<div class="tallies">';
    html += '<div class="tally know"><b>'+know+'</b><span>會</span></div>';
    html += '<div class="tally dontknow"><b>'+dont+'</b><span>不會</span></div>';
    html += '<div class="tally"><b>'+order.length+'</b><span>本輪題數</span></div>';
    html += '</div>';
    html += '<div class="actions">';
    html += '<button class="primary" id="bRetry"'+(dontList.length?'':' disabled')+'>只練不會的 '+dontList.length+' 題</button>';
    html += '<button class="ghost" id="bAll">全部重來（'+QS.length+' 題）</button>';
    html += '</div>';
    if (!dontList.length && graded>0){ html += '<p class="hint">太強了，這一輪沒有標記不會的題目。</p>'; }
    html += '</div></div>';
    stage.innerHTML = html;

    var retryBtn = document.getElementById('bRetry');
    if (retryBtn) retryBtn.onclick = function(){ startRetry(dontList); };
    document.getElementById('bAll').onclick = startAll;
  }

  function updateProgressDone(){
    counter.textContent = order.length + ' / ' + order.length;
    barFill.style.width = '100%';
  }

  function startRetry(dontList){
    order = dontList.slice();
    dontList.forEach(function(idx){ delete grades[idx]; });
    persist();
    pos=0; mode='retry'; renderCard();
  }
  function startAll(){
    order = QS.map(function(_,i){return i;});
    grades = {}; clearStore();
    pos=0; mode='full'; renderCard();
  }

  // 鍵盤
  document.addEventListener('keydown', function(e){
    if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    var k=e.key;
    if ((k===' '||k==='Enter') && !revealed && document.getElementById('bReveal')){ e.preventDefault(); doReveal(); return; }
    if (revealed && (k==='1')){ grade('know'); return; }
    if (revealed && (k==='2')){ grade('dontknow'); return; }
    if (k==='ArrowLeft'){ if(document.getElementById('bPrev')) prev(); }
    if (k==='ArrowRight'){ if(document.getElementById('bNext')) next(); }
  });

  // 啟動
  if (!QS.length){
    stage.innerHTML = '<div class="card"><p>這份題庫沒有題目。請確認上傳內容。</p></div>';
  } else {
    renderCard();
  }
})();
</script>
</body>
